# Builds + publishes the Windows installer to GitHub Releases when you push a version
# tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`), or via the manual "Run
# workflow" button. Runs on windows-latest — do NOT try to build the real release on
# macOS (NSIS cross-build needs wine and can't run Windows code-signing).
#
# electron-updater on the installed counter app polls this repo's Releases for
# `latest.yml` + the Setup.exe and updates the SHELL automatically. The web app itself
# updates server-side on every reload, so shell releases are rare.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # required so GITHUB_TOKEN can create the Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build + publish Windows installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When code signing is set up (Azure Trusted Signing), add:
          # AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          # AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
